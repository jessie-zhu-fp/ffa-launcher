<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFA Shipment Launcher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .launcher {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 700px;
      overflow: hidden;
    }
    .header {
      background: #1a2540;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-icon {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .header-title { color: white; font-size: 16px; font-weight: 600; }
    .header-sub { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 2px; }
    .body { padding: 22px 24px; display: flex; flex-direction: column; gap: 20px; }
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #1a2540;
      color: white;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .section-title { font-size: 14px; font-weight: 600; color: #111; }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge-path { background: #e8f0fe; color: #1a56db; }
    .badge-urp { background: #fde8e8; color: #c81e1e; }
    .clear-btn {
      margin-left: auto;
      font-size: 12px;
      color: #1a56db;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .clear-btn:hover { text-decoration: underline; }
    textarea {
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: #333;
      background: #fafafa;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #1a2540; background: white; }
    textarea::placeholder { color: #aaa; }
    .hint { font-size: 11px; color: #aaa; margin-top: 5px; }
    .btn-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .ws-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      background: white;
      font-size: 13px;
      color: #333;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .ws-btn:hover { background: #f5f5f5; border-color: #bbb; }
    .ws-btn.active { background: #1a2540; color: white; border-color: #1a2540; }
    .ws-btn.new-btn { border-color: #1a56db; color: #1a56db; }
    .ws-btn.new-btn:hover { background: #e8f0fe; }
    .ws-btn.new-btn.active { background: #1a56db; color: white; border-color: #1a56db; }
    .new-tag {
      font-size: 10px;
      background: #1a56db;
      color: white;
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: 600;
    }
    .ws-btn.new-btn.active .new-tag { background: rgba(255,255,255,0.3); }
    .divider { border: none; border-top: 1px solid #f0f0f0; }
    .url-preview-label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .url-preview {
      background: #f7f8fa;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 10px 12px;
      min-height: 40px;
    }
    .url-text {
      font-size: 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: #555;
      word-break: break-all;
      line-height: 1.6;
      white-space: pre-line;
    }
    .url-placeholder { color: #bbb; font-size: 13px; }
    .actions { display: flex; gap: 8px; }
    .btn-open {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      border: none;
      background: #1a2540;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-open:hover { opacity: 0.85; }
    .btn-copy {
      padding: 11px 18px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      background: white;
      color: #333;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-copy:hover { background: #f5f5f5; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1a2540;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="launcher">
  <div class="header">
    <div class="header-icon">📋</div>
    <div>
      <div class="header-title">FFA Shipment Launcher</div>
      <div class="header-sub">Batch paste IDs · select workspace &amp; tab · open in one click</div>
    </div>
  </div>
  <div class="body">
    <div>
      <div class="section-label">
        <div class="section-num">1</div>
        <div class="section-title">Shipment IDs</div>
        <button class="clear-btn" onclick="clearIds()">Clear all</button>
      </div>
      <textarea id="ids" placeholder="Paste one or more shipment IDs — one per line or comma-separated&#10;e.g. 3741450&#10;3741451, 3741452" oninput="updatePreview()"></textarea>
      <div class="hint">One per line, or comma-separated</div>
    </div>
    <hr class="divider">
    <div>
      <div class="section-label">
        <div class="section-num">2</div>
        <div class="section-title">Workspace</div>
        <span class="badge badge-path">path</span>
      </div>
      <div class="btn-grid" id="ws-grid">
        <button class="ws-btn" data-val="order" onclick="selectBtn(this,'ws')">📦 Order</button>
        <button class="ws-btn" data-val="quote" onclick="selectBtn(this,'ws')">💬 Quote</button>
        <button class="ws-btn" data-val="plan" onclick="selectBtn(this,'ws')">📅 Plan</button>
        <button class="ws-btn" data-val="schedule" onclick="selectBtn(this,'ws')">🗓️ Schedule</button>
        <button class="ws-btn" data-val="containers" onclick="selectBtn(this,'ws')">🗂️ Containers</button>
        <button class="ws-btn" data-val="bol" onclick="selectBtn(this,'ws')">📄 BOL</button>
        <button class="ws-btn" data-val="documents" onclick="selectBtn(this,'ws')">📁 Documents</button>
        <button class="ws-btn" data-val="messages" onclick="selectBtn(this,'ws')">✉️ Messages</button>
        <button class="ws-btn" data-val="assignees" onclick="selectBtn(this,'ws')">👤 Assignees</button>
        <button class="ws-btn" data-val="invoicing" onclick="selectBtn(this,'ws')">💰 Invoicing</button>
        <button class="ws-btn new-btn" data-val="fcl_fulfillment" onclick="selectBtn(this,'ws')">🚢 FCL Fulfillment <span class="new-tag">NEW</span></button>
        <button class="ws-btn new-btn" data-val="route" onclick="selectBtn(this,'ws')">🗺️ Route <span class="new-tag">NEW</span></button>
        <button class="ws-btn new-btn" data-val="purchase_orders" onclick="selectBtn(this,'ws')">🛒 Purchase Orders <span class="new-tag">NEW</span></button>
        <button class="ws-btn new-btn" data-val="load_plan" onclick="selectBtn(this,'ws')">📋 Load Plan <span class="new-tag">NEW</span></button>
      </div>
    </div>
    <hr class="divider">
    <div>
      <div class="section-label">
        <div class="section-num">3</div>
        <div class="section-title">Tab</div>
        <span class="badge badge-urp">urp_tab=</span>
      </div>
      <div class="btn-grid" id="tab-grid">
        <button class="ws-btn" data-val="summary" onclick="selectBtn(this,'tab')">📊 Summary</button>
        <button class="ws-btn" data-val="work" onclick="selectBtn(this,'tab')">🔧 Work</button>
        <button class="ws-btn" data-val="order" onclick="selectBtn(this,'tab')">📦 Order</button>
        <button class="ws-btn" data-val="route" onclick="selectBtn(this,'tab')">🗺️ Route</button>
        <button class="ws-btn" data-val="sops" onclick="selectBtn(this,'tab')">📋 SOPs</button>
        <button class="ws-btn" data-val="documents" onclick="selectBtn(this,'tab')">📁 Documents</button>
        <button class="ws-btn" data-val="messages" onclick="selectBtn(this,'tab')">✉️ Messages</button>
        <button class="ws-btn" data-val="products" onclick="selectBtn(this,'tab')">🎁 Products</button>
        <button class="ws-btn" data-val="exception" onclick="selectBtn(this,'tab')">⚠️ Exception</button>
      </div>
    </div>
    <hr class="divider">
    <div>
      <div class="url-preview-label">URL PREVIEW</div>
      <div class="url-preview">
        <div id="url-preview-text" class="url-placeholder">Select workspace and/or tab to preview</div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-open" onclick="openAll()">↗ Open</button>
      <button class="btn-copy" id="copy-btn" onclick="copyLinks()">Copy Links</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  let selectedWs = null;
  let selectedTab = null;
  function selectBtn(btn, type) {
    const gridId = type === 'ws' ? 'ws-grid' : 'tab-grid';
    document.getElementById(gridId).querySelectorAll('.ws-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (type === 'ws') selectedWs = btn.dataset.val;
    else selectedTab = btn.dataset.val;
    updatePreview();
  }
  function getIds() {
    const raw = document.getElementById('ids').value;
    return raw.split(/[\n,]/).map(s => s.trim()).filter(Boolean);
  }
  function buildUrl(id) {
    let url = `https://trade.flexport.com/shipments/${id}`;
    if (selectedWs) url += `/${selectedWs}`;
    let params = `utm_source=export_work_view_queue&utm_term=no_workspace`;
    let hash = selectedTab ? `#urp_tab=${selectedTab}` : '';
    return `${url}?${params}${hash}`;
  }
  function updatePreview() {
    const ids = getIds();
    const el = document.getElementById('url-preview-text');
    if (!selectedWs && !selectedTab) {
      el.className = 'url-placeholder';
      el.textContent = 'Select workspace and/or tab to preview';
      return;
    }
    const sampleId = ids.length > 0 ? ids[0] : '{FLEX_ID}';
    el.className = 'url-text';
    let text = buildUrl(sampleId);
    if (ids.length > 1) text += `\n... and ${ids.length - 1} more`;
    el.textContent = text;
  }
  function clearIds() {
    document.getElementById('ids').value = '';
    updatePreview();
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
  function openAll() {
    const ids = getIds();
    if (!ids.length) { showToast('Please enter at least one Shipment ID'); return; }
    ids.forEach(id => window.open(buildUrl(id), '_blank'));
  }
  function copyLinks() {
    const ids = getIds();
    if (!ids.length) { showToast('Please enter at least one Shipment ID'); return; }
    const links = ids.map(id => buildUrl(id)).join('\n');
    navigator.clipboard.writeText(links).then(() => showToast('Links copied!'));
  }
</script>
</body>
</html>
